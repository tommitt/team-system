<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DottComm">
  <defs>
    <linearGradient id="tile" x1="6" y1="4" x2="94" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4536e0"/>
      <stop offset="1" stop-color="#8c78ff"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="2" y="2" width="96" height="96" rx="24" fill="url(#tile)"/>
  <rect x="2.75" y="2.75" width="94.5" height="94.5" rx="23.25" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- monogram D: a bold rounded stroke, plain and confident -->
  <path d="M38 27 L38 73" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <path d="M38 27 A23 23 0 0 1 38 73" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- agent signal: a single accent dot -->
  <circle cx="78" cy="24" r="6.5" fill="#33e7b0"/>
</svg>
